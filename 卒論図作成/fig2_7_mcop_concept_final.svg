<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="750" height="550" viewBox="0 0 750 550" style="background-color:#FFFFFF; font-family:'Noto Sans CJK JP', 'Yu Gothic', 'Meiryo', sans-serif;">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M2,2 L8,5 L2,8 L3,5 Z" fill="#636E72" /></marker>
<marker id="axis_arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 L6,6 Z" fill="#2D3436" /></marker>
<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="1" dy="1" result="offsetblur"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect x="100" y="60" width="324.5" height="410" fill="#E0F7FA" opacity="0.7" />
<rect x="424.5" y="60" width="265.5" height="410" fill="#FFEBEE" opacity="0.7" />
<text x="262.25" y="90" font-size="16" font-weight="bold" fill="#0097e6" text-anchor="middle">実行可能領域</text>
<text x="557.25" y="90" font-size="16" font-weight="bold" fill="#c23616" text-anchor="middle">違反領域</text>
<line x1="100" y1="470" x2="690" y2="470" stroke="#2D3436" stroke-width="2" marker-end="url(#axis_arrow)" />
<text x="690" y="510" font-size="16" font-weight="bold" text-anchor="end" fill="#2D3436">遅延 (Delay) <tspan font-size="14" font-weight="normal">→ 小</tspan></text>
<line x1="100" y1="470" x2="100" y2="60" stroke="#2D3436" stroke-width="2" marker-end="url(#axis_arrow)" />
<text x="120" y="30" font-size="16" font-weight="bold" text-anchor="start" fill="#2D3436">帯域幅 (Bandwidth)</text>
<text x="120" y="50" font-size="14" text-anchor="start" fill="#2D3436">↑ 大</text>
<line x1="424.5" y1="60" x2="424.5" y2="470" stroke="#D63031" stroke-width="2" stroke-dasharray="8,4" />
<text x="424.5" y="495" font-size="14" font-weight="bold" fill="#D63031" text-anchor="middle">遅延制約 D<tspan baseline-shift="sub" font-size="smaller">max</tspan></text>
<circle cx="218.0" cy="367.5" r="7" fill="#B2BEC3" stroke="none" stroke-width="0" filter="url(#softShadow)" />
<text x="218.0" y="349.5" font-size="14" font-weight="normal" fill="#2D3436" text-anchor="middle" style="text-shadow: 2px 2px 0 #FFF;">解C</text>
<circle cx="306.5" cy="306.0" r="7" fill="#B2BEC3" stroke="none" stroke-width="0" filter="url(#softShadow)" />
<circle cx="336.0" cy="408.5" r="7" fill="#B2BEC3" stroke="none" stroke-width="0" filter="url(#softShadow)" />
<circle cx="412.7" cy="162.5" r="15" fill="none" stroke="#0984E3" stroke-width="2" opacity="0.5" />
<circle cx="412.7" cy="162.5" r="10" fill="#0984E3" stroke="#FFFFFF" stroke-width="2" filter="url(#softShadow)" />
<text x="412.7" y="137.5" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle" style="text-shadow: 2px 2px 0 #FFF;">解B (最適解)</text>
<circle cx="513.0" cy="121.5" r="7" fill="#D63031" stroke="none" stroke-width="0" filter="url(#softShadow)" />
<text x="513.0" y="103.5" font-size="14" font-weight="normal" fill="#2D3436" text-anchor="middle" style="text-shadow: 2px 2px 0 #FFF;">解A</text>
<circle cx="572.0" cy="265.0" r="7" fill="#D63031" stroke="none" stroke-width="0" filter="url(#softShadow)" />
<circle cx="631.0" cy="347.0" r="7" fill="#D63031" stroke="none" stroke-width="0" filter="url(#softShadow)" />
<path d="M 332.7 142.5 Q 365.2 140.0 397.7 157.5" stroke="#636E72" stroke-width="1.5" fill="none" marker-end="url(#arrow)" />
<text x="282.7" y="132.5" font-size="13" fill="#2D3436" text-anchor="end">制約を満たす中で<tspan x="282.7" dy="1.4em" font-weight="bold" fill="#0984E3">最も帯域が高い点</tspan></text>
</svg>