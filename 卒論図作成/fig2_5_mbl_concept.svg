<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350" style="background-color:#FFFFFF; font-family:'Yu Gothic', 'Meiryo', 'Hiragino Kaku Gothic ProN', sans-serif;">
<defs>
<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="1" dy="1" result="offsetblur"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="24" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0984E3" /></marker>
<marker id="arrowRed" markerWidth="10" markerHeight="7" refX="24" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#D63031" /></marker>
</defs>
<line x1="100" y1="180" x2="300" y2="180" stroke="#0984E3" stroke-width="20.0" marker-end="url(#arrowBlue)" opacity="0.8" />
<text x="200.0" y="150" font-size="16" font-weight="bold" fill="#0984E3" text-anchor="middle">200 Mbps</text>
<line x1="300" y1="180" x2="500" y2="180" stroke="#D63031" stroke-width="10.0" marker-end="url(#arrowRed)" opacity="0.8" />
<text x="400.0" y="150" font-size="16" font-weight="bold" fill="#D63031" text-anchor="middle">100 Mbps</text>
<text x="400.0" y="220" font-size="14" font-weight="bold" fill="#D63031" text-anchor="middle">ボトルネック (最小値)</text>
<line x1="500" y1="180" x2="700" y2="180" stroke="#0984E3" stroke-width="12.0" marker-end="url(#arrowBlue)" opacity="0.8" />
<text x="600.0" y="150" font-size="16" font-weight="bold" fill="#0984E3" text-anchor="middle">120 Mbps</text>
<circle cx="100" cy="180" r="22" fill="#FFFFFF" stroke="#2D3436" stroke-width="2" filter="url(#softShadow)" />
<text x="100" y="180" dy="6" font-size="16" font-weight="bold" fill="#2D3436" text-anchor="middle">S</text>
<circle cx="300" cy="180" r="22" fill="#FFFFFF" stroke="#2D3436" stroke-width="2" filter="url(#softShadow)" />
<text x="300" y="180" dy="6" font-size="16" font-weight="bold" fill="#2D3436" text-anchor="middle">v1</text>
<circle cx="500" cy="180" r="22" fill="#FFFFFF" stroke="#2D3436" stroke-width="2" filter="url(#softShadow)" />
<text x="500" y="180" dy="6" font-size="16" font-weight="bold" fill="#2D3436" text-anchor="middle">v2</text>
<circle cx="700" cy="180" r="22" fill="#FFFFFF" stroke="#2D3436" stroke-width="2" filter="url(#softShadow)" />
<text x="700" y="180" dy="6" font-size="16" font-weight="bold" fill="#2D3436" text-anchor="middle">D</text>
<text x="100" y="225" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">Start</text>
<text x="700" y="225" font-size="14" font-weight="bold" fill="#2D3436" text-anchor="middle">Goal</text>
</svg>