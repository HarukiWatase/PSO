<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400" style="background-color:#FFFFFF; font-family:'Yu Gothic', 'Meiryo', sans-serif;">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#000000" /></marker>
</defs>
<circle cx="250" cy="200" r="180" fill="none" stroke="#E0E0E0" stroke-width="2" />
<circle cx="250" cy="200" r="130" fill="none" stroke="#E0E0E0" stroke-width="2" />
<circle cx="250" cy="200" r="80" fill="none" stroke="#E0E0E0" stroke-width="2" />
<circle cx="250" cy="200" r="6" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
<text x="250" y="180" font-size="14" font-weight="bold" font-style="normal" fill="#000000" text-anchor="middle" dominant-baseline="middle">最適解 (Optimal)</text>
<circle cx="100" cy="320" r="8" fill="#000000" stroke="#000000" stroke-width="2" />
<text x="100" y="345" font-size="14" font-weight="bold" font-style="normal" fill="#000000" text-anchor="middle" dominant-baseline="middle">粒子 (Particle)</text>
<text x="80" y="320" font-size="14" font-weight="normal" font-style="italic" fill="#000000" text-anchor="end" dominant-baseline="middle">x_i</text>
<line x1="100" y1="320" x2="160" y2="310" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
<text x="140" y="300" font-size="14" font-weight="normal" font-style="italic" fill="#000000" text-anchor="middle" dominant-baseline="middle">v_i</text>
<circle cx="400" cy="100" r="8" fill="#000000" stroke="#000000" stroke-width="2" />
<line x1="400" y1="100" x2="350" y2="140" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
<circle cx="380" cy="300" r="8" fill="#000000" stroke="#000000" stroke-width="2" />
<line x1="380" y1="300" x2="320" y2="270" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
<circle cx="120" cy="100" r="8" fill="#000000" stroke="#000000" stroke-width="2" />
<line x1="120" y1="100" x2="160" y2="150" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
</svg>