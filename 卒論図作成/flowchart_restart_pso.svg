<?xml version="1.0" encoding="UTF-8" standalone="no"?>

<svg xmlns="http://www.w3.org/2000/svg" width="600" height="950" viewBox="0 0 600 950" style="background-color:#FFFFFF;">
<defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
        <feOffset dx="0" dy="2" result="offsetblur"/>
        <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#2D3436" />
    </marker>
    <marker id="arrowHeadRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#D63031" />
    </marker>
</defs>
    
<rect x="240.0" y="40" width="120" height="40" rx="20.0" ry="20.0" fill="#2D3436" stroke="#2D3436" stroke-width="1.5" filter="url(#softShadow)" />
<text x="300.0" y="60" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle" dominant-baseline="middle">開始</text>
<rect x="190.0" y="110" width="220" height="50" rx="6" ry="6" fill="#FFFFFF" stroke="#2D3436" stroke-width="1.5" filter="url(#softShadow)" />
<text x="300.0" y="135" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="13" fill="#2D3436" font-weight="normal" text-anchor="middle" dominant-baseline="middle">初期化 (粒子生成, pBest)</text>
<path d="M 300.0 80 L 300.0 110" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" />
<polygon points="300.0,190.0 390.0,220 300.0,250.0 210.0,220" fill="#FFF8E1" stroke="#F1C40F" stroke-width="1.5" filter="url(#softShadow)" />
<text x="300.0" y="220" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="13" fill="#2D3436" font-weight="normal" text-anchor="middle" dominant-baseline="middle">t &lt;= Tmax ?</text>
<path d="M 300.0 160 L 300.0 190" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" />
<rect x="200.0" y="280" width="200" height="40" rx="6" ry="6" fill="#FFFFFF" stroke="#2D3436" stroke-width="1.5" filter="url(#softShadow)" />
<text x="300.0" y="300" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="13" fill="#2D3436" font-weight="normal" text-anchor="middle" dominant-baseline="middle">動的ペナルティ更新</text>
<path d="M 300.0 250 L 300.0 280" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" />
<text x="310.0" y="265" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="11" fill="#2D3436" font-weight="normal" text-anchor="start" dominant-baseline="middle">Yes</text>
<rect x="170.0" y="350" width="260" height="70" rx="6" ry="6" fill="#F0F4F8" stroke="#0984E3" stroke-width="2" filter="url(#softShadow)" />
<text x="300.0" y="375" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="14" fill="#0984E3" font-weight="bold" text-anchor="middle" dominant-baseline="middle">並列評価プロセス (Workers)</text>
<text x="300.0" y="400" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="12" fill="#636E72" font-weight="normal" text-anchor="middle" dominant-baseline="middle">優先度エンコーディング → 適応度計算</text>
<path d="M 300.0 320 L 300.0 350" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" />
<rect x="170.0" y="440" width="260" height="50" rx="6" ry="6" fill="#FFFFFF" stroke="#2D3436" stroke-width="1.5" filter="url(#softShadow)" />
<text x="300.0" y="458" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="13" fill="#2D3436" font-weight="normal" text-anchor="middle" dominant-baseline="middle">pBest / gBest 更新</text>
<text x="300.0" y="478" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="12" fill="#636E72" font-weight="normal" text-anchor="middle" dominant-baseline="middle">停滞カウンタ更新 (Stagnation)</text>
<path d="M 300.0 420 L 300.0 440" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" />
<polygon points="300.0,530.0 420.0,570 300.0,610.0 180.0,570" fill="#FFEBEE" stroke="#D63031" stroke-width="1.5" filter="url(#softShadow)" />
<text x="300.0" y="560" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="13" fill="#D63031" font-weight="bold" text-anchor="middle" dominant-baseline="middle">停滞カウンタ &gt; 閾値?</text>
<text x="300.0" y="580" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="11" fill="#D63031" font-weight="normal" text-anchor="middle" dominant-baseline="middle">(Stagnation Check)</text>
<path d="M 300.0 490 L 300.0 530" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" />
<path d="M 420.0 570 L 480.0 570 L 480.0 610" stroke="#D63031" stroke-width="1.5" fill="none" marker-end="url(#arrowHeadRed)"  />
<text x="440.0" y="560" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="12" fill="#D63031" font-weight="normal" text-anchor="middle" dominant-baseline="middle">Yes</text>
<rect x="410.0" y="610" width="140" height="50" rx="6" ry="6" fill="#FFEBEE" stroke="#D63031" stroke-width="1.5" filter="url(#softShadow)" />
<text x="480.0" y="628" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="13" fill="#D63031" font-weight="bold" text-anchor="middle" dominant-baseline="middle">Explosion</text>
<text x="480.0" y="648" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="10" fill="#D63031" font-weight="normal" text-anchor="middle" dominant-baseline="middle">(エリート以外再初期化)</text>
<path d="M 480.0 660 L 480.0 710 L 300.0 710" stroke="#D63031" stroke-width="1.5" fill="none" marker-end="url(#arrowHeadRed)"  />
<path d="M 300.0 610 L 300.0 740" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" />
<rect x="200.0" y="740" width="200" height="40" rx="6" ry="6" fill="#FFFFFF" stroke="#2D3436" stroke-width="1.5" filter="url(#softShadow)" />
<text x="300.0" y="760" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="13" fill="#2D3436" font-weight="normal" text-anchor="middle" dominant-baseline="middle">空間的lBest計算</text>
<text x="315.0" y="620" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="11" fill="#2D3436" font-weight="normal" text-anchor="middle" dominant-baseline="middle">No</text>
<rect x="190.0" y="810" width="220" height="50" rx="6" ry="6" fill="#FFFFFF" stroke="#2D3436" stroke-width="1.5" filter="url(#softShadow)" />
<text x="300.0" y="835" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="13" fill="#2D3436" font-weight="normal" text-anchor="middle" dominant-baseline="middle">速度 V・位置 X 更新</text>
<path d="M 300.0 780 L 300.0 810" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)" />
<path d="M 300.0 860 L 300.0 880 L 100.0 880 L 100.0 220 L 210.0 220" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)"  />
<text x="110.0" y="210" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="11" fill="#636E72" font-weight="normal" text-anchor="start" dominant-baseline="middle">Next Generation</text>
<path d="M 390.0 220 L 520.0 220 L 520.0 900 L 360.0 900" stroke="#2D3436" stroke-width="1.5" fill="none" marker-end="url(#arrowHead)"  />
<text x="405.0" y="210" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="11" fill="#2D3436" font-weight="normal" text-anchor="start" dominant-baseline="middle">No (Finish)</text>
<rect x="240.0" y="880" width="120" height="40" rx="20.0" ry="20.0" fill="#2D3436" stroke="#2D3436" stroke-width="1.5" filter="url(#softShadow)" />
<text x="300.0" y="900" font-family="Yu Gothic, Meiryo, Hiragino Kaku Gothic ProN, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="middle" dominant-baseline="middle">終了</text>
</svg>